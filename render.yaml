services:
  - type: web
    name: disaster-command-center-backend
    runtime: python
    plan: free
    region: oregon

    # Build
    buildCommand: pip install -r requirements.txt

    # Start
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    # Health check — Render pings this to confirm service is alive
    healthCheckPath: /health

    # Environment variables (set values in Render dashboard, not here)
    envVars:
      - key: GEMINI_API_KEY1
        sync: false
      - key: GEMINI_API_KEY2
        sync: false
      - key: GEMINI_API_KEY3
        sync: false
      - key: GEMINI_API_KEY4
        sync: false
      - key: GEMINI_API_KEY5
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHONIOENCODING
        value: utf-8
      - key: PYTHONUNBUFFERED
        value: "1"
